name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    # windows-latest is required, not just convenient: one integration test
    # (MigrationsTests.Migrate_AppliesTheRealMigrationFilesAgainstSqlServer) applies the
    # real, on-disk EF Core migrations against a live SQL Server using Trusted_Connection
    # to "Server=.\SQLEXPRESS" — the same instance name/auth the app itself uses locally.
    # GitHub's windows-latest runners ship with SQL Server Express pre-installed under
    # that exact instance name, so this is the only runner that can exercise the real
    # migration files (they contain SQL-Server-specific type strings the Sqlite-based
    # tests can't validate) without adding a separate service container or SQL auth.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore
        run: dotnet restore GroceryInventoryTracker.slnx

      - name: Build
        run: dotnet build GroceryInventoryTracker.slnx --no-restore -c Release

      - name: Test
        run: dotnet test GroceryInventoryTracker.slnx --no-build -c Release --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Publish web project
        run: dotnet publish GroceryInventoryTracker/GroceryInventoryTracker.csproj --no-restore -c Release -o publish-output

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults

      - name: Upload publish output
        uses: actions/upload-artifact@v4
        with:
          name: web-publish-output
          path: publish-output

  docker-publish:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: GroceryInventoryTracker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
