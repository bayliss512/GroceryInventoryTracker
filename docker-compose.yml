services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: grocery-inventory-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:?Set SA_PASSWORD in a .env file}"
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: GroceryInventoryTracker/Dockerfile
    container_name: grocery-inventory-web
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=GroceryInventoryTracker;User Id=sa;Password=${SA_PASSWORD:?Set SA_PASSWORD in a .env file};TrustServerCertificate=True;MultipleActiveResultSets=true"
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  sqlserver-data:
